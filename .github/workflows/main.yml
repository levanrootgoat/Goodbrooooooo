name: quandeptraiok

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        npm init -y
        npm install net tls hpack axios
        echo "✅ Dependencies installed"
    
    - name: List files
      run: ls -la
    
    - name: Run bot client
      run: |
        chmod +x miku2.js 2>/dev/null || true
        node miku2.js
